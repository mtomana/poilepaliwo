<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ceny paliw</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --panel: rgba(255,255,255,0.82);
      --panel-strong: rgba(255,255,255,0.94);
      --text: #101114;
      --muted: #6b7280;
      --line: rgba(16,17,20,0.08);
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.08);

      --pb95: #1fbf75;
      --pb95-soft: rgba(31,191,117,0.14);
      --pb98: #5b8cff;
      --pb98-soft: rgba(91,140,255,0.14);
      --on: #ff9a3d;
      --on-soft: rgba(255,154,61,0.16);

      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top left, rgba(91,140,255,0.10), transparent 30%),
        radial-gradient(circle at top right, rgba(31,191,117,0.10), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      padding: 32px 18px 48px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 22px;
    }

    .title {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
      font-weight: 800;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      max-width: 520px;
      line-height: 1.5;
    }

    .badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 999px;
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      font-size: 0.92rem;
      color: var(--muted);
    }

    .badge-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 0 6px rgba(245,158,11,0.14);
    }

    .badge.ready .badge-dot {
      background: #10b981;
      box-shadow: 0 0 0 6px rgba(16,185,129,0.14);
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.7);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
    }

    .top {
      padding: 26px;
      margin-bottom: 18px;
    }

    .meta {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
      margin-top: 22px;
    }

    .meta-card {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    .eyebrow {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .effective-date {
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 750;
      letter-spacing: -0.04em;
      margin: 0;
    }

    .helper {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .notice-title {
      margin: 0 0 8px;
      font-size: 1.02rem;
      font-weight: 650;
      line-height: 1.4;
    }

    .notice-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid rgba(16,17,20,0.18);
      padding-bottom: 2px;
      font-size: 0.95rem;
    }

    .notice-link:hover {
      border-bottom-color: rgba(16,17,20,0.6);
    }

    .prices {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 18px;
    }

    .price-card {
      position: relative;
      overflow: hidden;
      padding: 26px 24px 24px;
      border-radius: var(--radius-xl);
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      min-height: 186px;
    }

    .price-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.46), transparent 52%);
      pointer-events: none;
    }

    .price-card::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -68px;
      top: -68px;
      border-radius: 50%;
      pointer-events: none;
    }

    .price-card.pb95::after { background: var(--pb95-soft); }
    .price-card.pb98::after { background: var(--pb98-soft); }
    .price-card.on::after { background: var(--on-soft); }

    .fuel-code {
      position: relative;
      z-index: 1;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .price-card.pb95 .fuel-code { color: var(--pb95); }
    .price-card.pb98 .fuel-code { color: var(--pb98); }
    .price-card.on .fuel-code { color: var(--on); }

    .price {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: clamp(2.5rem, 6vw, 4rem);
      line-height: 0.92;
      font-weight: 800;
      letter-spacing: -0.06em;
    }

    .unit {
      position: relative;
      z-index: 1;
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .change {
      position: relative;
      z-index: 1;
      margin-top: 6px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .change.down { color: #16a34a; }
    .change.up { color: #dc2626; }

    .history {
      padding: 22px 22px 18px;
    }

    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 14px;
    }

    .history-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .history-note {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .chart-wrap {
      height: 210px;
      position: relative;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 860px) {
      .hero,
      .history-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .meta,
      .prices {
        grid-template-columns: 1fr;
      }

      .price-card {
        min-height: 164px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="top panel">
      <div class="hero">
        <div>
          <h1 class="title">Ceny paliw</h1>
          <p class="subtitle" id="subtitle"></p>
        </div>
        <div class="badge" id="statusBadge">
          <span class="badge-dot"></span>
          <span id="statusText"></span>
        </div>
      </div>

      <div class="meta">
        <div class="meta-card">
          <div class="eyebrow">Obowiązuje od</div>
          <p class="effective-date" id="effectiveFrom"></p>
          <div class="helper" id="waitMessage"></div>
        </div>

        <div class="meta-card">
          <div class="eyebrow">Ostatnie obwieszczenie</div>
          <p class="notice-title" id="noticeTitle"></p>
          <a class="notice-link" id="noticeLink" href="#" target="_blank" rel="noopener noreferrer">Zobacz w Monitorze Polskim</a>
          <div class="helper" id="publishedAt"></div>
        </div>
      </div>
    </section>

    <section class="prices">
      <article class="price-card pb95">
        <div class="fuel-code">PB95</div>
        <p class="price" id="pb95Price"></p>
        <div class="unit">zł / litr</div>
        <div class="change" id="pb95Change"></div>
      </article>

      <article class="price-card pb98">
        <div class="fuel-code">PB98</div>
        <p class="price" id="pb98Price"></p>
        <div class="unit">zł / litr</div>
        <div class="change" id="pb98Change"></div>
      </article>

      <article class="price-card on">
        <div class="fuel-code">ON</div>
        <p class="price" id="onPrice"></p>
        <div class="unit">zł / litr</div>
        <div class="change" id="onChange"></div>
      </article>
    </section>

    <section class="history panel">
      <div class="history-head">
        <h2 class="history-title">Ostatnie dni</h2>
        <div class="history-note">PB95 / PB98 / ON</div>
      </div>
      <div class="chart-wrap">
        <canvas id="historyChart" width="936" height="210"></canvas>
      </div>
    </section>
  </div>

  <script>
    const DATA = {
      knownForTomorrow: true,
      effectiveFrom: '2026-04-03',
      publishedAt: '2026-04-02, 14:37',
      noticeTitle: 'Monitor Polski 2026 poz. 348',
      noticeUrl: 'https://monitorpolski.gov.pl/MP/2026/348',
      prices: {
        pb95: 6.19,
        pb98: 6.74,
        on: 6.09,
      },
      history: [
        { date: '28.03', pb95: 6.11, pb98: 6.66, on: 6.20 },
        { date: '29.03', pb95: 6.12, pb98: 6.67, on: 6.22 },
        { date: '30.03', pb95: 6.15, pb98: 6.70, on: 6.24 },
        { date: '31.03', pb95: 6.16, pb98: 6.71, on: 6.26 },
        { date: '01.04', pb95: 6.18, pb98: 6.73, on: 6.27 },
        { date: '02.04', pb95: 6.19, pb98: 6.74, on: 6.29 },
      ]
    };

    const fmtPrice = (value) => value.toFixed(2).replace('.', ',');
    const fmtDiff = (value) => value.toFixed(2).replace('.', ',');

    document.getElementById('pb95Price').textContent = fmtPrice(DATA.prices.pb95);
    document.getElementById('pb98Price').textContent = fmtPrice(DATA.prices.pb98);
    document.getElementById('onPrice').textContent = fmtPrice(DATA.prices.on);

    function setPriceChange(priceId, key) {
      const target = document.getElementById(priceId);
      const prev = DATA.history.at(-2)?.[key];
      const current = DATA.prices[key];

      if (typeof prev !== 'number' || typeof current !== 'number') {
        target.textContent = 'bez zmian';
        return;
      }

      const diff = current - prev;
      if (Math.abs(diff) < 0.005) {
        target.textContent = 'bez zmian';
      } else if (diff > 0) {
        target.textContent = `+${fmtDiff(diff)} zł`;
        target.classList.add('up');
      } else {
        target.textContent = `${fmtDiff(diff)} zł`;
        target.classList.add('down');
      }
    }

    setPriceChange('pb95Change', 'pb95');
    setPriceChange('pb98Change', 'pb98');
    setPriceChange('onChange', 'on');

    document.getElementById('effectiveFrom').textContent = DATA.effectiveFrom;
    document.getElementById('noticeTitle').textContent = DATA.noticeTitle;
    document.getElementById('noticeLink').href = DATA.noticeUrl;
    document.getElementById('publishedAt').textContent = `Opublikowano: ${DATA.publishedAt}`;

    const statusBadge = document.getElementById('statusBadge');
    const statusText = document.getElementById('statusText');
    const subtitle = document.getElementById('subtitle');
    const waitMessage = document.getElementById('waitMessage');

    if (DATA.knownForTomorrow) {
      statusBadge.classList.add('ready');
      statusText.textContent = 'Jutro już znane';
      subtitle.textContent = 'Aktualne stawki na najbliższy dzień obowiązywania.';
      waitMessage.textContent = 'Nowe stawki są już opublikowane i gotowe do odczytu.';
    } else {
      statusText.textContent = 'Czekamy na jutro';
      subtitle.textContent = 'Nowe stawki pojawiają się dzień wcześniej, ale o różnej porze.';
      waitMessage.textContent = 'Na jutro jeszcze nie ma nowego obwieszczenia. Warto zajrzeć ponownie później.';
    }

    function drawChart(canvas, series) {
      const ctx = canvas.getContext('2d');
      const ratio = window.devicePixelRatio || 1;
      const cssWidth = canvas.clientWidth;
      const cssHeight = canvas.clientHeight;
      canvas.width = Math.round(cssWidth * ratio);
      canvas.height = Math.round(cssHeight * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

      const w = cssWidth;
      const h = cssHeight;
      const padding = { top: 18, right: 10, bottom: 30, left: 10 };
      const innerW = w - padding.left - padding.right;
      const innerH = h - padding.top - padding.bottom;

      const values = series.flatMap(x => [x.pb95, x.pb98, x.on]);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = Math.max(max - min, 0.08);
      const chartMin = min - range * 0.22;
      const chartMax = max + range * 0.18;

      const xAt = (i) => padding.left + (innerW / Math.max(series.length - 1, 1)) * i;
      const yAt = (v) => padding.top + innerH - ((v - chartMin) / (chartMax - chartMin)) * innerH;

      ctx.clearRect(0, 0, w, h);

      ctx.strokeStyle = 'rgba(16,17,20,0.08)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const y = padding.top + (innerH / 3) * i;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(w - padding.right, y);
        ctx.stroke();
      }

      const drawSeries = (key, stroke, fill) => {
        ctx.beginPath();
        series.forEach((item, i) => {
          const x = xAt(i);
          const y = yAt(item[key]);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();

        series.forEach((item, i) => {
          const x = xAt(i);
          const y = yAt(item[key]);
          ctx.beginPath();
          ctx.fillStyle = '#ffffff';
          ctx.arc(x, y, 4.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.fillStyle = fill;
          ctx.arc(x, y, 2.8, 0, Math.PI * 2);
          ctx.fill();
        });
      };

      drawSeries('pb95', '#1fbf75', '#1fbf75');
      drawSeries('pb98', '#5b8cff', '#5b8cff');
      drawSeries('on', '#ff9a3d', '#ff9a3d');

      ctx.fillStyle = '#6b7280';
      ctx.font = '12px Inter, system-ui, sans-serif';
      ctx.textAlign = 'center';
      series.forEach((item, i) => {
        ctx.fillText(item.date, xAt(i), h - 8);
      });
    }

    const canvas = document.getElementById('historyChart');
    const redraw = () => drawChart(canvas, DATA.history);
    redraw();
    window.addEventListener('resize', redraw);
  </script>
</body>
</html>
