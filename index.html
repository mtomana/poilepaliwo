<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ceny paliw</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --panel: rgba(255,255,255,0.82);
      --panel-strong: rgba(255,255,255,0.94);
      --text: #101114;
      --muted: #6b7280;
      --line: rgba(16,17,20,0.08);
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.08);

      --pb95: #1fbf75;
      --pb95-soft: rgba(31,191,117,0.14);
      --pb98: #5b8cff;
      --pb98-soft: rgba(91,140,255,0.14);
      --on: #ff9a3d;
      --on-soft: rgba(255,154,61,0.16);

      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top left, rgba(91,140,255,0.10), transparent 30%),
        radial-gradient(circle at top right, rgba(31,191,117,0.10), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      padding: 32px 18px 48px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    .hero {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 22px;
    }

    .hero > div {
      width: 100%;
    }

    .title {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
      font-weight: 800;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      max-width: 520px;
      line-height: 1.5;
    }

    .status {
      border-radius: 12px;
      padding: 0.75rem 0.9rem;
      font-size: 0.95rem;
      border: 1px solid transparent;
      display: inline-block;
      display: block;
      width: 100%;
      margin-top: 12px;
    }

    .status.ready {
      background: rgba(22, 163, 74, 0.1);
      border-color: rgba(22, 163, 74, 0.25);
      color: #166534;
    }

    .status.waiting {
      background: rgba(217, 119, 6, 0.12);
      border-color: rgba(217, 119, 6, 0.28);
      color: #9a3412;
    }

     .online-badge {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2), 0 0 10px rgba(34, 197, 94, 0.4);
      animation: onlinePulse 2.2s ease-in-out infinite;
      z-index: 2;
    }

    @keyframes onlinePulse {
      0%, 100% {
        opacity: 0.35;
        box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.12), 0 0 6px rgba(34, 197, 94, 0.22);
      }
      50% {
        opacity: 1;
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.18), 0 0 14px rgba(34, 197, 94, 0.48);
      }
    }


    .panel {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.7);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
    }

    .top {
      position: relative;
      padding: 26px;
      margin-bottom: 18px;
    }

    .meta {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
      margin-top: 22px;
    }

    .meta-card {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    .eyebrow {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .eyebrow-date {
      letter-spacing: 0;
      text-transform: none;
    }

    .effective-date {
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 750;
      letter-spacing: -0.04em;
      margin: 0;
    }

    .helper {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .notice {
      margin: 0 0 8px;
      font-size: 1.02rem;
      line-height: 1.4;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .notice-title {
      font-weight: 650;
    }

    .notice-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid rgba(16,17,20,0.18);
      padding-bottom: 2px;
      font-size: 0.95rem;
    }

    .notice-link:hover {
      border-bottom-color: rgba(16,17,20,0.6);
    }

    .prices {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 18px;
    }

    .price-card {
      position: relative;
      overflow: hidden;
      padding: 26px 24px 24px;
      border-radius: var(--radius-xl);
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      min-height: 164px;
    }

    .price-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.46), transparent 52%);
      pointer-events: none;
    }

    .price-card::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -68px;
      top: -68px;
      border-radius: 50%;
      pointer-events: none;
    }

    .price-card.pb95::after { background: var(--pb95-soft); }
    .price-card.pb98::after { background: var(--pb98-soft); }
    .price-card.on::after { background: var(--on-soft); }

    .fuel-code {
      position: relative;
      z-index: 1;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .price-card.pb95 .fuel-code { color: var(--pb95); }
    .price-card.pb98 .fuel-code { color: var(--pb98); }
    .price-card.on .fuel-code { color: var(--on); }

    .price {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: clamp(2.5rem, 6vw, 4rem);
      line-height: 0.92;
      font-weight: 800;
      letter-spacing: -0.06em;
    }

    .price-main {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .price-side {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 7px;
      min-width: 94px;
    }

    .unit {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .change {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .change.down { color: #16a34a; }
    .change.up { color: #dc2626; }

    .change.flat { color: #6b7280; }

    .change-line {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .trend-icon {
      width: 24px;
      height: 14px;
      display: inline-block;
    }

    .history {
      padding: 22px 22px 18px;
    }

    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 14px;
    }

    .history-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .history-note {
      color: var(--muted);
      font-size: 0.88rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .history-note .fuel.pb95 { color: var(--pb95); }
    .history-note .fuel.pb98 { color: var(--pb98); }
    .history-note .fuel.on { color: var(--on); }

    .chart-wrap {
      height: 210px;
      position: relative;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 720px) {
      .hero,
      .history-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .meta {
        grid-template-columns: 1fr;
      }

      .prices {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .price-card {
        min-height: 0;
        padding: 18px 12px 14px;
        border-radius: var(--radius-md);
      }

      .price-main {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .price-side {
        align-items: flex-start;
        min-width: 0;
        gap: 5px;
      }

      .fuel-code {
        margin-bottom: 10px;
        font-size: 0.85rem;
        letter-spacing: 0.08em;
      }

      .price {
        font-size: clamp(1.35rem, 7vw, 2rem);
      }

      .unit,
      .change {
        font-size: 0.72rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="top panel">
      <span class="online-badge" aria-label="Dane online" title="Dane online"></span>
      <div class="hero">
        <div>
          <h1 class="title">Ceny paliw</h1>
          <p class="subtitle" id="subtitle">Po ile jutro zatankujesz benzynę, olej napędowy? Czy opłaca się czekać?</p>
          <div class="status" id="statusBox">
            <span id="statusText"></span>
          </div>
        </div>
      </div>

      <div class="meta">
        <div class="meta-card">
          <div class="eyebrow">Obowiązuje od</div>
          <p class="effective-date" id="effectiveFrom"></p>
          <div class="helper" id="waitMessage"></div>
        </div>

        <div class="meta-card">
          <div class="eyebrow">Ostatnie obwieszczenie · <span class="eyebrow-date" id="publishedAtDate"></span></div>
          <p class="notice">
            <span id="noticeTitle" class="notice-title"></span>
            <a class="notice-link" id="noticeLink" href="#" target="_blank" rel="noopener noreferrer">Zobacz w Monitorze Polskim</a>
          </p>
        </div>
      </div>
    </section>

    <section class="prices">
      <article class="price-card pb95">
        <div class="fuel-code">PB95</div>
        <div class="price-main">
          <p class="price" id="pb95Price"></p>
          <div class="price-side">
            <div class="change-line">
              <span class="trend-icon" id="pb95Trend" aria-hidden="true"></span>
              <span class="change" id="pb95Change"></span>
            </div>
            <div class="unit">zł / litr</div>
          </div>
        </div>
      </article>

      <article class="price-card pb98">
        <div class="fuel-code">PB98</div>
        <div class="price-main">
          <p class="price" id="pb98Price"></p>
          <div class="price-side">
            <div class="change-line">
              <span class="trend-icon" id="pb98Trend" aria-hidden="true"></span>
              <span class="change" id="pb98Change"></span>
            </div>
            <div class="unit">zł / litr</div>
          </div>
        </div>
      </article>

      <article class="price-card on">
        <div class="fuel-code">ON</div>
        <div class="price-main">
          <p class="price" id="onPrice"></p>
          <div class="price-side">
            <div class="change-line">
              <span class="trend-icon" id="onTrend" aria-hidden="true"></span>
              <span class="change" id="onChange"></span>
            </div>
            <div class="unit">zł / litr</div>
          </div>
        </div>
      </article>
    </section>

    <section class="history panel">
      <div class="history-head">
        <h2 class="history-title">Ostatnie dni</h2>
        <div class="history-note">
          <span class="fuel pb95">PB95</span>
          <span>/</span>
          <span class="fuel pb98">PB98</span>
          <span>/</span>
          <span class="fuel on">ON</span>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="historyChart" width="936" height="210"></canvas>
      </div>
    </section>
  </div>

  <script>
    const DATA = {
      knownForTomorrow: false,
      effectiveFrom: '2026-04-03',
      publishedAt: '2026-04-02, 14:37',
      noticeTitle: 'Monitor Polski 2026 poz. 348',
      noticeUrl: 'https://monitorpolski.gov.pl/MP/2026/348',
      prices: {
        pb95: 6.19,
        pb98: 6.80,
        on: 7.64,
      },
      history: [
        { date: '31.03', pb95: 6.16, pb98: 6.76, on: 7.60 },
        { date: '01.04', pb95: 6.21, pb98: 6.81, on: 7.66 },
        { date: '02.04', pb95: 6.23, pb98: 6.84, on: 7.65 },
        { date: '03.04', pb95: 6.19, pb98: 6.80, on: 7.64 },
      ]
    };

    const fmtPrice = (value) => value.toFixed(2).replace('.', ',');
    const fmtDiff = (value) => value.toFixed(2).replace('.', ',');
    const trendSvg = (type) => {
      const color = type === 'up' ? '#dc2626' : type === 'down' ? '#16a34a' : '#6b7280';
      const points = type === 'up'
        ? '2,11 8,7 13,9 20,3'
        : type === 'down'
          ? '2,3 8,7 13,5 20,11'
          : '2,7 8,7 13,7 20,7';
      return `<svg viewBox="0 0 22 14" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="${type}"><polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" /></svg>`;
    };

    document.getElementById('pb95Price').textContent = fmtPrice(DATA.prices.pb95);
    document.getElementById('pb98Price').textContent = fmtPrice(DATA.prices.pb98);
    document.getElementById('onPrice').textContent = fmtPrice(DATA.prices.on);

    function setPriceChange(priceId, trendId, key) {
      const target = document.getElementById(priceId);
      const trend = document.getElementById(trendId);
      const prev = DATA.history.at(-2)?.[key];
      const current = DATA.prices[key];
      target.classList.remove('up', 'down', 'flat');

      if (typeof prev !== 'number' || typeof current !== 'number') {
        target.textContent = 'bez zmian';
        target.classList.add('flat');
        trend.innerHTML = trendSvg('flat');
        return;
      }

      const diff = current - prev;
      if (Math.abs(diff) < 0.005) {
        target.textContent = 'bez zmian';
        target.classList.add('flat');
        trend.innerHTML = trendSvg('flat');
      } else if (diff > 0) {
        target.textContent = `+${fmtDiff(diff)} zł`;
        target.classList.add('up');
        trend.innerHTML = trendSvg('up');
      } else {
        target.textContent = `${fmtDiff(diff)} zł`;
        target.classList.add('down');
        trend.innerHTML = trendSvg('down');
      }
    }

    setPriceChange('pb95Change', 'pb95Trend', 'pb95');
    setPriceChange('pb98Change', 'pb98Trend', 'pb98');
    setPriceChange('onChange', 'onTrend', 'on');

    document.getElementById('effectiveFrom').textContent = DATA.effectiveFrom;
    document.getElementById('noticeTitle').textContent = DATA.noticeTitle;
    document.getElementById('noticeLink').href = DATA.noticeUrl;
    document.getElementById('publishedAtDate').textContent = DATA.publishedAt; //.split(',')[0];

    const statusBox = document.getElementById('statusBox');
    const statusText = document.getElementById('statusText');
    
    const waitMessage = document.getElementById('waitMessage');

    if (DATA.knownForTomorrow) {
      statusBox.classList.add('ready');
      statusText.textContent = 'Nowe ceny na jutro są już dostępne ✅';
      //waitMessage.textContent = 'Nowe stawki są już opublikowane i gotowe do odczytu.';
    } else {
      statusBox.classList.add('waiting');
      statusText.textContent = 'Czekamy na publikację cen na kolejny dzień – sprawdź ponownie później ⏳';
      //waitMessage.textContent = 'Na jutro jeszcze nie ma nowego obwieszczenia. Warto zajrzeć ponownie później.';
    }

    function drawChart(canvas, series) {
      const ctx = canvas.getContext('2d');
      const ratio = window.devicePixelRatio || 1;
      const cssWidth = canvas.clientWidth;
      const cssHeight = canvas.clientHeight;
      canvas.width = Math.round(cssWidth * ratio);
      canvas.height = Math.round(cssHeight * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

      const w = cssWidth;
      const h = cssHeight;
      const padding = { top: 18, right: 10, bottom: 30, left: 10 };
      const innerW = w - padding.left - padding.right;
      const innerH = h - padding.top - padding.bottom;

      const values = series.flatMap(x => [x.pb95, x.pb98, x.on]);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = Math.max(max - min, 0.08);
      const chartMin = min - range * 0.22;
      const chartMax = max + range * 0.18;

      const xAt = (i) => padding.left + (innerW / Math.max(series.length - 1, 1)) * i;
      const yAt = (v) => padding.top + innerH - ((v - chartMin) / (chartMax - chartMin)) * innerH;

      ctx.clearRect(0, 0, w, h);

      ctx.strokeStyle = 'rgba(16,17,20,0.08)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const y = padding.top + (innerH / 3) * i;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(w - padding.right, y);
        ctx.stroke();
      }

      const drawSeries = (key, stroke, fill) => {
        ctx.beginPath();
        series.forEach((item, i) => {
          const x = xAt(i);
          const y = yAt(item[key]);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();

        series.forEach((item, i) => {
          const x = xAt(i);
          const y = yAt(item[key]);
          ctx.beginPath();
          ctx.fillStyle = '#ffffff';
          ctx.arc(x, y, 4.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.fillStyle = fill;
          ctx.arc(x, y, 2.8, 0, Math.PI * 2);
          ctx.fill();
        });
      };

      drawSeries('pb95', '#1fbf75', '#1fbf75');
      drawSeries('pb98', '#5b8cff', '#5b8cff');
      drawSeries('on', '#ff9a3d', '#ff9a3d');

      ctx.fillStyle = '#6b7280';
      ctx.font = '12px Inter, system-ui, sans-serif';
      ctx.textAlign = 'center';
      series.forEach((item, i) => {
        ctx.fillText(item.date, xAt(i), h - 8);
      });
    }

    const canvas = document.getElementById('historyChart');
    const redraw = () => drawChart(canvas, DATA.history);
    redraw();
    window.addEventListener('resize', redraw);
  </script>
</body>
</html>
