<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ceny paliw</title>
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
      c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
      t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
      y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "w5i9haogng");
  </script>
  <script>
    const DATA = {
      knownForTomorrow: false,
      effectiveFrom: '2026-04-03',
      publishedAt: '2026-04-02, 14:37',
      noticeTitle: 'Monitor Polski 2026 poz. 352',
      noticeUrl: 'https://monitorpolski.gov.pl/MP/2026/352',
      prices: {
        pb95: 6.19,
        pb98: 6.80,
        on: 7.64,
      },
      history: [
        { date: '31.03', pb95: 6.16, pb98: 6.76, on: 7.60 },
        { date: '01.04', pb95: 6.21, pb98: 6.81, on: 7.66 },
        { date: '02.04', pb95: 6.23, pb98: 6.84, on: 7.65 },
        { date: '03.04', pb95: 6.19, pb98: 6.80, on: 7.64 },
      ]
    };
  </script>
  <link rel="stylesheet" href="site.css" />
</head>
<body>
  <div class="wrap">
    <section class="top panel">
      <span class="online-badge" aria-label="Dane online" title="Dane online"></span>
      <div class="hero">
        <div>
          <h1 class="title">Ceny paliw</h1>
          <p class="subtitle" id="subtitle">Po ile jutro zatankujesz benzynę, olej napędowy? Czy opłaca się czekać?</p>
          <div class="status" id="statusBox">
            <span id="statusText"></span>
          </div>
        </div>
      </div>

      <div class="meta">
        <div class="meta-card">
          <div class="eyebrow">Obowiązuje od</div>
          <p class="effective-date" id="effectiveFrom"></p>
          <div class="helper" id="waitMessage"></div>
        </div>

        <div class="meta-card">
          <div class="eyebrow">Ostatnie obwieszczenie · <span class="eyebrow-date" id="publishedAtDate"></span></div>
          <p class="notice">
            <span id="noticeTitle" class="notice-title"></span>
            <a class="notice-link" id="noticeLink" href="#" target="_blank" rel="noopener noreferrer">Zobacz w Monitorze Polskim</a>
          </p>
        </div>
      </div>
    </section>

    <section class="prices">
      <article class="price-card pb95">
        <div class="fuel-code">PB95</div>
        <div class="price-main">
          <p class="price" id="pb95Price"></p>
          <div class="price-side">
            <div class="change-line">
              <span class="trend-icon" id="pb95Trend" aria-hidden="true"></span>
              <span class="change" id="pb95Change"></span>
            </div>
            <div class="unit">zł / litr</div>
          </div>
        </div>
      </article>

      <article class="price-card pb98">
        <div class="fuel-code">PB98</div>
        <div class="price-main">
          <p class="price" id="pb98Price"></p>
          <div class="price-side">
            <div class="change-line">
              <span class="trend-icon" id="pb98Trend" aria-hidden="true"></span>
              <span class="change" id="pb98Change"></span>
            </div>
            <div class="unit">zł / litr</div>
          </div>
        </div>
      </article>

      <article class="price-card on">
        <div class="fuel-code">ON</div>
        <div class="price-main">
          <p class="price" id="onPrice"></p>
          <div class="price-side">
            <div class="change-line">
              <span class="trend-icon" id="onTrend" aria-hidden="true"></span>
              <span class="change" id="onChange"></span>
            </div>
            <div class="unit">zł / litr</div>
          </div>
        </div>
      </article>
    </section>

    <section class="history panel">
      <div class="history-head">
        <h2 class="history-title">Ostatnie dni</h2>
        <div class="history-note">
          <span class="fuel pb95">PB95</span>
          <span>/</span>
          <span class="fuel pb98">PB98</span>
          <span>/</span>
          <span class="fuel on">ON</span>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="historyChart" width="936" height="210"></canvas>
      </div>
    </section>
  </div>

  <script>
    

    const fmtPrice = (value) => value.toFixed(2).replace('.', ',');
    const fmtDiff = (value) => value.toFixed(2).replace('.', ',');
    const trendSvg = (type) => {
      const color = type === 'up' ? '#dc2626' : type === 'down' ? '#16a34a' : '#6b7280';
      const points = type === 'up'
        ? '2,11 8,7 13,9 20,3'
        : type === 'down'
          ? '2,3 8,7 13,5 20,11'
          : '2,7 8,7 13,7 20,7';
      return `<svg viewBox="0 0 22 14" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="${type}"><polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" /></svg>`;
    };

    document.getElementById('pb95Price').textContent = fmtPrice(DATA.prices.pb95);
    document.getElementById('pb98Price').textContent = fmtPrice(DATA.prices.pb98);
    document.getElementById('onPrice').textContent = fmtPrice(DATA.prices.on);

    function setPriceChange(priceId, trendId, key) {
      const target = document.getElementById(priceId);
      const trend = document.getElementById(trendId);
      const prev = DATA.history.at(-2)?.[key];
      const current = DATA.prices[key];
      target.classList.remove('up', 'down', 'flat');

      if (typeof prev !== 'number' || typeof current !== 'number') {
        target.textContent = 'bez zmian';
        target.classList.add('flat');
        trend.innerHTML = trendSvg('flat');
        return;
      }

      const diff = current - prev;
      if (Math.abs(diff) < 0.005) {
        target.textContent = 'bez zmian';
        target.classList.add('flat');
        trend.innerHTML = trendSvg('flat');
      } else if (diff > 0) {
        target.textContent = `+${fmtDiff(diff)} zł`;
        target.classList.add('up');
        trend.innerHTML = trendSvg('up');
      } else {
        target.textContent = `${fmtDiff(diff)} zł`;
        target.classList.add('down');
        trend.innerHTML = trendSvg('down');
      }
    }

    setPriceChange('pb95Change', 'pb95Trend', 'pb95');
    setPriceChange('pb98Change', 'pb98Trend', 'pb98');
    setPriceChange('onChange', 'onTrend', 'on');

    document.getElementById('effectiveFrom').textContent = DATA.effectiveFrom;
    document.getElementById('noticeTitle').textContent = DATA.noticeTitle;
    document.getElementById('noticeLink').href = DATA.noticeUrl;
    document.getElementById('publishedAtDate').textContent = DATA.publishedAt; //.split(',')[0];

    const statusBox = document.getElementById('statusBox');
    const statusText = document.getElementById('statusText');
    
    const waitMessage = document.getElementById('waitMessage');

    if (DATA.knownForTomorrow) {
      statusBox.classList.add('ready');
      statusText.textContent = 'Nowe ceny na jutro są już dostępne ✅';
      //waitMessage.textContent = 'Nowe stawki są już opublikowane i gotowe do odczytu.';
    } else {
      statusBox.classList.add('waiting');
      statusText.textContent = 'Czekamy na publikację cen na kolejny dzień – sprawdź ponownie później ⏳';
      //waitMessage.textContent = 'Na jutro jeszcze nie ma nowego obwieszczenia. Warto zajrzeć ponownie później.';
    }

    function drawChart(canvas, series) {
      const ctx = canvas.getContext('2d');
      const ratio = window.devicePixelRatio || 1;
      const cssWidth = canvas.clientWidth;
      const cssHeight = canvas.clientHeight;
      canvas.width = Math.round(cssWidth * ratio);
      canvas.height = Math.round(cssHeight * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

      const w = cssWidth;
      const h = cssHeight;
      const padding = { top: 18, right: 10, bottom: 30, left: 10 };
      const innerW = w - padding.left - padding.right;
      const innerH = h - padding.top - padding.bottom;

      const values = series.flatMap(x => [x.pb95, x.pb98, x.on]);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = Math.max(max - min, 0.08);
      const chartMin = min - range * 0.22;
      const chartMax = max + range * 0.18;

      const xAt = (i) => padding.left + (innerW / Math.max(series.length - 1, 1)) * i;
      const yAt = (v) => padding.top + innerH - ((v - chartMin) / (chartMax - chartMin)) * innerH;

      ctx.clearRect(0, 0, w, h);

      ctx.strokeStyle = 'rgba(16,17,20,0.08)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const y = padding.top + (innerH / 3) * i;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(w - padding.right, y);
        ctx.stroke();
      }

      const drawSeries = (key, stroke, fill) => {
        ctx.beginPath();
        series.forEach((item, i) => {
          const x = xAt(i);
          const y = yAt(item[key]);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();

        series.forEach((item, i) => {
          const x = xAt(i);
          const y = yAt(item[key]);
          ctx.beginPath();
          ctx.fillStyle = '#ffffff';
          ctx.arc(x, y, 4.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.fillStyle = fill;
          ctx.arc(x, y, 2.8, 0, Math.PI * 2);
          ctx.fill();
        });
      };

      drawSeries('pb95', '#1fbf75', '#1fbf75');
      drawSeries('pb98', '#5b8cff', '#5b8cff');
      drawSeries('on', '#ff9a3d', '#ff9a3d');

      ctx.fillStyle = '#6b7280';
      ctx.font = '12px Inter, system-ui, sans-serif';
      ctx.textAlign = 'center';
      series.forEach((item, i) => {
        ctx.fillText(item.date, xAt(i), h - 8);
      });
    }

    const canvas = document.getElementById('historyChart');
    const redraw = () => drawChart(canvas, DATA.history);
    redraw();
    window.addEventListener('resize', redraw);
  </script>
</body>
</html>
